services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: porcia
      POSTGRES_USER: porcia
      POSTGRES_PASSWORD: porcia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis placeholder (future-ready). Enable when needed.
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"

volumes:
  postgres_data:

