# Development Profile

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/porcia_dev}
    username: ${DB_USERNAME:porcia}
    password: ${DB_PASSWORD:porcia}
    
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  
  jpa:
    hibernate:
      ddl-auto: validate
    
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    
    show-sql: true
  
  flyway:
    enabled: true
    clean-disabled: false

logging:
  level:
    root: INFO
    com.porcia.backend: DEBUG
    org.springframework: INFO
    org.hibernate: DEBUG
    org.springframework.security: DEBUG
  
  file:
    name: ./logs/porcia-dev.log

springdoc:
  swagger-ui:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans
  
  endpoint:
    health:
      show-details: always

security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl-seconds: 86400
  
  allowed-origins: http://localhost:3000,http://localhost:3001
