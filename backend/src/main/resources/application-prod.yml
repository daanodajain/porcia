# Production Profile

server:
  port: 8080
  
  compression:
    enabled: true
  
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 60000
  
  jpa:
    hibernate:
      ddl-auto: validate
    
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
    
    show-sql: false
    open-in-view: false
  
  flyway:
    # See application.yml for why this is disabled.
    enabled: false
    clean-disabled: true
    baseline-on-migrate: true
    validate-on-migrate: true

logging:
  level:
    root: WARN
    com.porcia.backend: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.springframework.security: WARN
  
  file:
    name: ${LOG_FILE_PATH:/var/log/porcia/backend.log}
    max-size: 50MB
    max-history: 90
  
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    enabled: false
  
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  
  endpoint:
    health:
      show-details: never
      show-components: never

security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl-seconds: ${JWT_ACCESS_TTL:900}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:2592000}
  
  allowed-origins: ${CORS_ORIGINS}
